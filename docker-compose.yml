version: '3'
 
services:
 
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
 
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db
 
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
    ports:
      - "3307:3306"
 